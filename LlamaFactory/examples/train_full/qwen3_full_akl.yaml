### model
model_name_or_path: Qwen/Qwen2.5-Coder-1.5B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z3_config.json  # choices: [ds_z0_config.json, ds_z2_config.json, ds_z3_config.json]
use_akl_loss: true
akl_mu: 0.5
akl_ce_weight: 1.0
akl_distill_weight: 0.1
# Optional: specify an external teacher model.
# For full fine-tuning, if `ref_model` is omitted, AKL will use a frozen copy of `model_name_or_path` as teacher.
ref_model: Qwen/Qwen2.5-Coder-7B-Instruct


### dataset
dataset: qwen_code
template: qwen
cutoff_len: 6144
max_samples: 100000000
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/qwen-coder-1_5b/full/akl_3
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 32
learning_rate: 5e-6
num_train_epochs: 10.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

